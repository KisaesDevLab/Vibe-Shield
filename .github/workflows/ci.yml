name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node — typecheck + lint + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vibe
          POSTGRES_PASSWORD: vibe
          POSTGRES_DB: vibe_shield
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build schema (workspace dep)
        run: pnpm --filter @kisaesdevlab/vibe-shield-schema build
      - name: Lint
        run: pnpm -r --if-present lint
      - name: Hard rule #2 — direct @anthropic-ai/sdk import outside gateway
        run: bash scripts/check-no-anthropic-direct.sh
      - name: Typecheck
        run: pnpm -r --if-present typecheck
      - name: Test
        env:
          DATABASE_URL: postgres://vibe:vibe@localhost:5432/vibe_shield
        run: pnpm -r --if-present test

  python:
    name: Python — ruff + mypy + pytest + QA recall gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync engine deps + spaCy model
        working-directory: apps/engine
        run: |
          $HOME/.local/bin/uv sync
      - name: Ruff
        working-directory: apps/engine
        run: $HOME/.local/bin/uv run ruff check .
      - name: Mypy
        working-directory: apps/engine
        run: $HOME/.local/bin/uv run mypy app
      - name: Pytest
        working-directory: apps/engine
        run: $HOME/.local/bin/uv run pytest
      - name: QA recall/precision gate (BUILD_PLAN §12)
        working-directory: apps/engine
        run: PYTHONPATH=../.. $HOME/.local/bin/uv run python -m qa.recall_precision

  build-image:
    name: Build engine Docker image
    runs-on: ubuntu-latest
    needs: [python]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/engine
          tags: vibe-shield-engine:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
