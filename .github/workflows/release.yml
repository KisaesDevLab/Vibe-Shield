name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  ghcr:
    name: Build + push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - component: engine
            context: ./apps/engine
            dockerfile: ./apps/engine/Dockerfile
          - component: gateway
            # Gateway Dockerfile needs the workspace root for the
            # @kisaesdevlab/vibe-shield-schema dep build.
            context: .
            dockerfile: ./apps/gateway/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vibe-shield-${{ matrix.component }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      # v1.1 §3.11: multi-arch build. linux/amd64 for the NucBox M6
      # appliance baseline; linux/arm64 for the Pi 5 future-deployment
      # path called out in BUILD_PLAN §20.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
