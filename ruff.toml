# Root ruff config. apps/engine inherits this via [tool.ruff] in its pyproject.
target-version = "py312"
line-length = 100

extend-exclude = [
  "qa/corpus",
  ".venv",
  "**/__pycache__",
]

[lint]
select = [
  "E", "F", "W",   # pycodestyle / pyflakes
  "I",             # isort
  "B",             # bugbear
  "UP",            # pyupgrade
  "S",             # bandit (security)
  "RUF",           # ruff-specific
]
ignore = [
  "E501",          # line length handled by formatter
  "S101",          # assert in tests is fine
]
[lint.flake8-bugbear]
# B008 fires on FastAPI's `Depends(...)` argument-default idiom — that's
# the framework's intended usage, not a bug. Same for Query/Path/Body/Header.
extend-immutable-calls = [
  "fastapi.Depends",
  "fastapi.Query",
  "fastapi.Path",
  "fastapi.Body",
  "fastapi.Header",
  "fastapi.Cookie",
  "fastapi.Form",
  "fastapi.File",
  "fastapi.Security",
]

[lint.per-file-ignores]
"**/tests/**" = ["S"]
"**/test_*.py" = ["S"]

[format]
quote-style = "double"
indent-style = "space"
