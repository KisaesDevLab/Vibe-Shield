# Vibe Shield — standalone docker-compose fragment.
#
# **Audience: NOT Vibe-Appliance operators.**
# If you are running on Vibe-Appliance, ignore this directory entirely.
# The appliance reads `.appliance/manifest.json` (sibling dir) and owns
# the overlay, env rendering, Caddy config, and lifecycle.
#
# This fragment is for operators bolting Vibe Shield onto an existing
# docker-compose stack they maintain themselves. It assumes:
#
#   - An existing Postgres reachable on the network (set DATABASE_URL).
#   - An existing Redis reachable on the network (set REDIS_URL).
#   - An existing Caddy (or other reverse proxy) you wire up by hand —
#     see ./caddy.snippet for the two vhosts.
#   - You will hand-merge these services into your compose, or include
#     this file via `docker compose -f your-compose.yml -f shield.yml`.
#
# Migration handling: the gateway image's entrypoint runs migrations on
# startup when MIGRATIONS_AUTO=true (Drizzle's __drizzle_migrations
# table keeps re-runs idempotent). This replaces the v1.0/v1.1 separate
# `vibe-shield-migrate` one-shot — you no longer need to invoke a
# bootstrap profile before `up -d`.
#
# Image tag policy: pin a release tag (v1.1.x), not ":latest".

x-vibe-shield-env: &vibe-shield-env
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  TZ: ${TZ:-UTC}

services:

  # ---- vibe-shield-engine ----------------------------------------
  # Internal-only. No external port. Reachable on the internal Docker
  # network as `vibe-shield-engine:8000`.
  vibe-shield-engine:
    image: ghcr.io/kisaesdevlab/vibe-shield-engine:${VIBE_SHIELD_VERSION:-v1.4.0}
    container_name: vibe-shield-engine
    restart: unless-stopped
    environment:
      <<: *vibe-shield-env
      VS_ENGINE_HOST: 0.0.0.0
      VS_ENGINE_PORT: "8000"
      VS_ENGINE_SPACY_MODEL: en_core_web_lg
      VS_ENGINE_IMAGE_OCR_ENABLED: "true"
      VS_ENGINE_IMAGE_FACE_DETECTION_ENABLED: "true"
      VS_ENGINE_IMAGE_BARCODE_DETECTION_ENABLED: "true"
      LOG_LEVEL: ${VIBE_SHIELD_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    networks:
      - vibe-internal

  # ---- vibe-shield-gateway ----------------------------------------
  # Anthropic-Messages-compatible API. Vibe app containers reach this
  # via `vibe-shield-gateway:8080` on the internal network; Caddy (your
  # caddy, not packaged here) fronts it on gateway.shield.<domain> for
  # cross-host access.
  #
  # MIGRATIONS_AUTO=true → the entrypoint runs `node dist/migrate.js`
  # before starting the server. Set to "false" if you prefer to run
  # migrations as a separate one-shot job for blue-green control.
  vibe-shield-gateway:
    image: ghcr.io/kisaesdevlab/vibe-shield-gateway:${VIBE_SHIELD_VERSION:-v1.4.0}
    container_name: vibe-shield-gateway
    restart: unless-stopped
    environment:
      <<: *vibe-shield-env
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "8080"
      DATABASE_URL: ${VIBE_SHIELD_DATABASE_URL}
      REDIS_URL: ${VIBE_SHIELD_REDIS_URL}
      ENGINE_URL: http://vibe-shield-engine:8000
      MIGRATIONS_AUTO: ${VIBE_SHIELD_MIGRATIONS_AUTO:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VS_KEK: ${VS_KEK}
      ZDR_ENABLED: ${VIBE_SHIELD_ZDR_ENABLED:-false}
      GATEWAY_ADMIN_KEY: ${VIBE_SHIELD_ADMIN_KEY}
      RATE_LIMIT_PER_MINUTE: ${VIBE_SHIELD_RATE_LIMIT:-60}
      SPEND_CAP_MICRODOLLARS: ${VIBE_SHIELD_SPEND_CAP:-500000000}
      ANTHROPIC_REPROBE_INTERVAL_MS: ${VIBE_SHIELD_REPROBE_INTERVAL_MS:-900000}
      MAX_REQUEST_BYTES: ${VIBE_SHIELD_MAX_REQUEST_BYTES:-1048576}
      SESSION_TTL_MINUTES: ${VIBE_SHIELD_SESSION_TTL_MINUTES:-60}
      LOG_LEVEL: ${VIBE_SHIELD_LOG_LEVEL:-info}
      # Phase 25 G2.8 / G2.6
      SPEND_RATE_PER_MINUTE_MICRODOLLARS: ${VIBE_SHIELD_SPEND_RATE_PER_MINUTE:-100000000}
      PROMPTS_DIR: ${VIBE_SHIELD_PROMPTS_DIR:-}
      # Phase 24 — magic-link sign-in (v1.3+). All optional; unset
      # SMTP_HOST disables magic-link and forces X-Admin-Key auth.
      PUBLIC_URL: ${VIBE_SHIELD_PUBLIC_URL:-}
      SMTP_HOST: ${VIBE_SHIELD_SMTP_HOST:-}
      SMTP_PORT: ${VIBE_SHIELD_SMTP_PORT:-587}
      SMTP_USER: ${VIBE_SHIELD_SMTP_USER:-}
      SMTP_PASSWORD: ${VIBE_SHIELD_SMTP_PASSWORD:-}
      SMTP_FROM: ${VIBE_SHIELD_SMTP_FROM:-}
      SMTP_TLS: ${VIBE_SHIELD_SMTP_TLS:-true}
      BOOTSTRAP_ADMIN_EMAIL: ${VIBE_SHIELD_BOOTSTRAP_ADMIN_EMAIL:-}
      SESSION_IDLE_TTL_MINUTES: ${VIBE_SHIELD_SESSION_IDLE_TTL_MINUTES:-1440}
      MAGIC_LINK_TTL_MINUTES: ${VIBE_SHIELD_MAGIC_LINK_TTL_MINUTES:-15}
      # Phase 17 v1.4 — Redact module artifact storage.
      REDACT_JOBS_DIR: /var/lib/vibe-shield/redact/jobs
      REDACT_MAX_UPLOAD_BYTES: ${VIBE_SHIELD_REDACT_MAX_UPLOAD_BYTES:-26214400}
    volumes:
      # Phase 17 v1.4 — persistent storage for per-job artifacts
      # (source upload, redacted PDF, extracted MD/JSON, audit log).
      # Survives container recreate; backed up by the appliance's
      # standard volume-snapshot job.
      - vibe-shield-redact:/var/lib/vibe-shield/redact
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      vibe-shield-engine:
        condition: service_healthy
    networks:
      - vibe-internal

  # ---- vibe-shield-admin -----------------------------------------
  # Static React SPA served by nginx on :80. Caddy serves it on
  # shield.<domain>; the SPA calls /v1/admin/* same-origin which your
  # Caddy must route to the gateway.
  #
  # VITE_BASE_PATH controls the asset prefix the nginx entrypoint hook
  # (/docker-entrypoint.d/40-base-path.sh) bakes into the SPA bundle.
  # Defaults to `/` (subdomain mount: shield.<domain>/...). Set to e.g.
  # `/shield/` if you front this image with a reverse proxy that mounts
  # the admin under a path prefix and strips that prefix before hitting
  # nginx. Vibe-Appliance operators ignore this — the appliance's per-app
  # env file supplies the right value automatically.
  vibe-shield-admin:
    image: ghcr.io/kisaesdevlab/vibe-shield-admin:${VIBE_SHIELD_VERSION:-v1.4.0}
    container_name: vibe-shield-admin
    restart: unless-stopped
    environment:
      <<: *vibe-shield-env
      VITE_BASE_PATH: ${VIBE_SHIELD_ADMIN_BASE_PATH:-/}
    networks:
      - vibe-internal

# Reuse an existing internal network. Override VIBE_NETWORK_NAME to
# whatever your stack already defines.
networks:
  vibe-internal:
    external: true
    name: ${VIBE_NETWORK_NAME:-vibe-network}

volumes:
  # Persistent volume for Phase 17 v1.4 Redact module artifacts.
  vibe-shield-redact: {}
