# Vibe Shield — appliance docker-compose fragment.
#
# Paste these three services into the Vibe Appliance's
# /opt/vibe/appliance/docker-compose.yml. They share the appliance's
# existing Postgres + Redis (no new infra needed).
#
# What this file does NOT do (intentional — these are appliance-level):
#   - Define the postgres / redis services (you already have them).
#   - Define the caddy reverse-proxy (see ./caddy.snippet).
#   - Set ANTHROPIC_API_KEY or VS_KEK (see ./env.example + the installer).
#
# Image tag policy: pin a release tag (v1.1.x), not ":latest". The
# appliance update flow controls when Shield rolls forward.

x-vibe-shield-env: &vibe-shield-env
  # Shared by both engine + gateway. Override per-service below.
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  TZ: ${TZ:-UTC}

services:

  # ---- vibe-shield-engine ----------------------------------------
  # Internal-only. No external port. Internal Docker network access
  # is via the service name `vibe-shield-engine:8000`.
  vibe-shield-engine:
    image: ghcr.io/kisaesdevlab/vibe-shield-engine:${VIBE_SHIELD_VERSION:-v1.1.3}
    container_name: vibe-shield-engine
    restart: unless-stopped
    environment:
      <<: *vibe-shield-env
      VS_ENGINE_HOST: 0.0.0.0
      VS_ENGINE_PORT: "8000"
      VS_ENGINE_SPACY_MODEL: en_core_web_lg
      # v1.1 image backends ship enabled in the production image; flip
      # individually to false if the appliance disables image redaction.
      VS_ENGINE_IMAGE_OCR_ENABLED: "true"
      VS_ENGINE_IMAGE_FACE_DETECTION_ENABLED: "true"
      VS_ENGINE_IMAGE_BARCODE_DETECTION_ENABLED: "true"
      LOG_LEVEL: ${VIBE_SHIELD_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    networks:
      - vibe-internal
    # No ports: section — engine is reachable only on the internal
    # Docker network. Caddy doesn't route to it.

  # ---- vibe-shield-migrate (one-shot) ----------------------------
  # Runs `node scripts/migrate.js` then exits 0. Drizzle's
  # __drizzle_migrations table makes this idempotent. The appliance
  # bootstrap + every update should run this before starting the
  # gateway.
  #
  # Usage:
  #   docker compose run --rm vibe-shield-migrate
  #
  # `profiles: [bootstrap]` keeps this out of the default `up`.
  vibe-shield-migrate:
    image: ghcr.io/kisaesdevlab/vibe-shield-gateway:${VIBE_SHIELD_VERSION:-v1.1.3}
    container_name: vibe-shield-migrate
    profiles: ["bootstrap"]
    command: ["node", "packages/schema/dist/scripts/migrate.js"]
    environment:
      DATABASE_URL: ${VIBE_SHIELD_DATABASE_URL}
    depends_on:
      vibe-postgres:
        condition: service_healthy
    networks:
      - vibe-internal

  # ---- vibe-shield-gateway ----------------------------------------
  # Public-ish: reachable from Vibe app containers on the internal
  # network as `vibe-shield-gateway:8080`. Caddy fronts it on
  # `gateway.shield.<domain>` for cross-host access (Tailscale-only by
  # default — see caddy.snippet).
  vibe-shield-gateway:
    image: ghcr.io/kisaesdevlab/vibe-shield-gateway:${VIBE_SHIELD_VERSION:-v1.1.3}
    container_name: vibe-shield-gateway
    restart: unless-stopped
    environment:
      <<: *vibe-shield-env
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "8080"
      DATABASE_URL: ${VIBE_SHIELD_DATABASE_URL}
      REDIS_URL: ${VIBE_SHIELD_REDIS_URL}
      ENGINE_URL: http://vibe-shield-engine:8000
      # Secrets — populate via env_file or the appliance secret manager.
      # See ./env.example for the canonical list.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VS_KEK: ${VS_KEK}
      ZDR_ENABLED: ${VIBE_SHIELD_ZDR_ENABLED:-false}
      GATEWAY_ADMIN_KEY: ${VIBE_SHIELD_ADMIN_KEY}
      # Quotas — sensible defaults; tune per-tenant via policies.
      RATE_LIMIT_PER_MINUTE: ${VIBE_SHIELD_RATE_LIMIT:-60}
      SPEND_CAP_MICRODOLLARS: ${VIBE_SHIELD_SPEND_CAP:-500000000}
      ANTHROPIC_REPROBE_INTERVAL_MS: ${VIBE_SHIELD_REPROBE_INTERVAL_MS:-900000}
      MAX_REQUEST_BYTES: ${VIBE_SHIELD_MAX_REQUEST_BYTES:-1048576}
      SESSION_TTL_MINUTES: ${VIBE_SHIELD_SESSION_TTL_MINUTES:-60}
      LOG_LEVEL: ${VIBE_SHIELD_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      vibe-postgres:
        condition: service_healthy
      vibe-redis:
        condition: service_healthy
      vibe-shield-engine:
        condition: service_healthy
    networks:
      - vibe-internal
    # Caddy routes external traffic; no direct host port binding.

  # ---- vibe-shield-admin -----------------------------------------
  # Static React SPA. Caddy serves the built assets on
  # `shield.<domain>` (Tailscale-only by default). It calls the
  # gateway via same-origin /v1/admin/* fetches; Caddy handles the
  # path-based routing.
  vibe-shield-admin:
    image: ghcr.io/kisaesdevlab/vibe-shield-admin:${VIBE_SHIELD_VERSION:-v1.1.3}
    container_name: vibe-shield-admin
    restart: unless-stopped
    environment:
      <<: *vibe-shield-env
    networks:
      - vibe-internal

# Reuse the appliance's existing internal network. Adjust the network
# name to whatever the appliance manifest already defines (e.g.,
# `vibe-network`, `vibe_default`, etc.).
networks:
  vibe-internal:
    external: true
    name: ${VIBE_NETWORK_NAME:-vibe-network}
